version: '3.8'

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

services:
  # ==========================================================================
  # Infrastructure Services
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alumni_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d alumni_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-your_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-your_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-your_access_key}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-your_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Application Services
  # ==========================================================================
  node-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://api_user:password@postgres:5432/alumni_portal
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-your_redis_password}
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
      JWT_PRIVATE_KEY_PATH: /secrets/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /secrets/jwt_public.pem
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      BLIND_INDEX_KEY: ${BLIND_INDEX_KEY:-}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      TOTP_ISSUER: ThaparAlumniPortal
    volumes:
      - ./secrets:/secrets:ro
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  go-matcher:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
      args:
        SERVICE: matcher
    environment:
      DATABASE_URL: postgresql://go_worker:worker_password@postgres:5432/alumni_portal
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  go-verifier:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
      args:
        SERVICE: verifier
    environment:
      DATABASE_URL: postgresql://go_worker:worker_password@postgres:5432/alumni_portal
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  go-importer:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
      args:
        SERVICE: importer
    environment:
      DATABASE_URL: postgresql://go_worker:worker_password@postgres:5432/alumni_portal
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      LOG_LEVEL: info
    volumes:
      - ./backend/uploads:/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  go-dedup:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
      args:
        SERVICE: dedup
    environment:
      DATABASE_URL: postgresql://go_worker:worker_password@postgres:5432/alumni_portal
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  python-pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://api_user:password@postgres:5432/alumni_portal
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-your_redis_password}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      GMASS_API_KEY: ${GMASS_API_KEY:-}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./secrets/ssl:/etc/nginx/ssl:ro
    depends_on:
      - node-backend
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:
