# Redis Configuration for Alumni Portal
# Persistence
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security
# requirepass is set via docker-compose environment
protected-mode yes
bind 0.0.0.0

# Performance
tcp-keepalive 300
timeout 0
databases 16

# Logging
loglevel notice
