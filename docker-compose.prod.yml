version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certs:/etc/ssl/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - internal
    restart: always
    logging: *default-logging

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  go_matcher:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
      args:
        SERVICE: matcher
    env_file:
      - ./go-backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: always
    logging: *default-logging

  go_verifier:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
      args:
        SERVICE: verifier
    env_file:
      - ./go-backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    restart: always
    logging: *default-logging

  postgres:
    image: postgres:15-alpine
    user: postgres
    env_file:
      - ./infra/postgres/.env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redisdata:/data
    networks:
      - internal
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    env_file:
      - ./infra/rabbitmq/.env.production
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - internal
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

networks:
  public:
  internal:
    internal: true

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
